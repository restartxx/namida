name: Build Android Fork (WebDAV Fix)

on:
  workflow_dispatch:

jobs:
  build_android:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: false # Essencial: Desliga o clone automático pra não bater na porta trancada do ffmpeg_build
          fetch-depth: 0

      - name: Fetch Public Submodules Only (The Hack)
        run: |
          echo "Iniciando submódulos manualmente..."
          git submodule init
          
          echo "Removendo referências do repositório privado (ffmpeg_build)..."
          git config --remove-section submodule.external/ffmpeg_build || true
          git rm --cached external/ffmpeg_build || true
          rm -rf .git/modules/external/ffmpeg_build || true
          
          echo "Baixando o resto (traduções, etc)..."
          git submodule update --recursive || true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: pubspec.yaml

      - name: Free Disk Space
        continue-on-error: true
        run: |
          sudo swapoff -a
          sudo rm -f /swapfile
          sudo apt clean
          docker rmi $(docker image ls -aq)
          df -h

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: "17"

      - name: Setup Dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Generate Dummy Keystore for Fork Release
        # Gera uma chave de debug local para enganar o build --release
        run: |
          keytool -genkey -v -keystore android/app/keystore.jks -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Fork Debug,O=Namida Fork,C=BR"
          echo "storePassword=android" > android/key.properties
          echo "keyPassword=android" >> android/key.properties
          echo "keyAlias=androiddebugkey" >> android/key.properties
          echo "storeFile=keystore.jks" >> android/key.properties

      - name: Extract Version
        id: extract_version
        run: |
          VERSION=$(grep -o 'version:.*' pubspec.yaml | awk '{print $2}')
          VERSION_NAME=$(echo $VERSION | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Build APKs
        run: |
          mkdir -p build_final
          
          echo "Compilando ARM64 (Paciência, isso leva uns 10 minutos)..."
          flutter build apk --target-platform android-arm64 --release
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk build_final/namida-v${{ steps.extract_version.outputs.version_name }}-fork-arm64-v8a.apk
          
          echo "Compilando ARM32..."
          flutter build apk --target-platform android-arm --release
          mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk build_final/namida-v${{ steps.extract_version.outputs.version_name }}-fork-armeabi-v7a.apk

      - name: Upload APKs to GitHub Actions Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Namida-WebDAV-Fixed-APKs
          path: build_final/*.apk
          retention-days: 7
